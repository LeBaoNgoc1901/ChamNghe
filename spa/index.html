<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Cuộc thi & Chứng chỉ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F6E7D8] text-gray-800 font-['Inter'] leading-relaxed antialiased">

    <div class="max-w-7xl mx-auto px-6 py-16">
        <!-- Section 1: Dấu Ấn Bản Sắc -->
        <section class="mb-24">
            <div class="mb-12">
                <h1 class="text-6xl md:text-7xl font-['Playfair_Display'] font-black text-gray-900 mb-6 tracking-tight">
                    DẤU ẤN BẢN SẮC
                </h1>
                <p class="text-xl md:text-2xl text-gray-600 max-w-3xl font-light">
                    Nơi những nỗ lực thầm lặng được "mã hóa" thành giá trị thật. Tự tay thiết kế tương lai bắt đầu từ
                    việc tích lũy những dấu mốc nhỏ nhất hôm nay.
                </p>
            </div>
            <div id="completed-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Completed cards go here -->
            </div>
        </section>

        <!-- Section 2: Hành Trình Đang Đi -->
        <section class="mb-24">
            <div class="mb-12 flex items-center gap-4">
                <div class="h-1 w-12 bg-[#F0A19D] rounded-full"></div>
                <h2 class="text-4xl font-['Playfair_Display'] font-black text-gray-800 uppercase tracking-widest">
                    Hành Trình Đang Đi
                </h2>
            </div>
            <div id="ongoing-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Ongoing cards go here -->
            </div>
        </section>

        <!-- Section 3: Cơ Hội Mở Lối -->
        <section class="mb-24">
            <div class="mb-12 flex items-center gap-4">
                <div class="h-1 w-12 bg-[#8DB6A0] rounded-full"></div>
                <h2 class="text-4xl font-['Playfair_Display'] font-black text-gray-800 uppercase tracking-widest">
                    Cơ Hội Mở Lối
                </h2>
            </div>
            <div id="suggested-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Suggested cards go here -->
            </div>
        </section>
    </div>

    <!-- Modal Structure -->
    <div id="modal-container"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm px-4">
        <div
            class="bg-white/80 backdrop-blur-xl border border-white/20 p-8 md:p-12 rounded-[2.5rem] shadow-2xl max-w-2xl w-full relative modal-glass animate-popIn">
            <button onclick="closeModal()"
                class="absolute top-6 right-6 p-2 rounded-full hover:bg-gray-100 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div id="modal-content" class="space-y-8 max-h-[80vh] overflow-y-auto pr-2 custom-scrollbar">
                <!-- Modal content dynamically injected -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
